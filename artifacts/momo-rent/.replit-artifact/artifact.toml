kind = "web"
previewPath = "/"
title = "MOMO Car Rental"
version = "1.0.0"
id = "artifacts/momo-rent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22728

[services.development]
run = "pnpm --filter @workspace/momo-rent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/momo-rent", "run", "build" ]
publicDir = "artifacts/momo-rent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22728"
BASE_PATH = "/"
